name: Angular CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Angular App
        run: npm run build -- --configuration production

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --token "1//03LWs1Gz7fhZ9CgYIARAAGAMSNwF-L9IraEz38H5f4En8oVzxa1WSl0LS1jyYW3UGnkucEmgQFLSI6r3HWvhX_hLi7FERd-G4AXI"